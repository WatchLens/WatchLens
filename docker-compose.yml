services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openrecui}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-openrecui}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openrecui}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openrecui

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openrecui}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-openrecui}
      SECRET_KEY: ${SECRET_KEY}
      JWT_EXPIRE_DAYS: ${JWT_EXPIRE_DAYS:-7}
      ADMIN_LOGIN_ID: ${ADMIN_LOGIN_ID:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATA_BASE_URL: ${DATA_BASE_URL:-/data}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - openrecui

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    depends_on:
      - backend
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - openrecui

  # Data file serving (videos, thumbnails, etc.)
  data-nginx:
    image: nginx:alpine
    volumes:
      - ./data:/usr/share/nginx/html/data:ro
      - ./nginx-data.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - openrecui

volumes:
  postgres_data:

networks:
  openrecui:
    driver: bridge
